<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>시계</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
    }

    .analog {
      width: 300px;
      height: 300px;
    }

    .analog svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 24px rgba(99, 179, 237, 0.35));
    }
  </style>
</head>
<body>
<div class="analog">
  <svg viewBox="0 0 200 200" id="analogSvg">
    <circle cx="100" cy="100" r="96" fill="#1a1a2e" stroke="#63b3ed" stroke-width="3"/>
    <g id="ticks"></g>
    <line id="hourHand"   x1="100" y1="100" x2="100" y2="40" stroke="#e2e8f0" stroke-width="6"  stroke-linecap="round"/>
    <line id="minuteHand" x1="100" y1="100" x2="100" y2="22" stroke="#90cdf4" stroke-width="4"  stroke-linecap="round"/>
    <line id="secondHand" x1="100" y1="110" x2="100" y2="18" stroke="#fc8181" stroke-width="2"  stroke-linecap="round"/>
    <circle cx="100" cy="100" r="5" fill="#fc8181"/>
  </svg>
</div>

<script>
  const ticksGroup = document.getElementById('ticks');
  for (let i = 0; i < 60; i++) {
    const angle = (i / 60) * 2 * Math.PI - Math.PI / 2;
    const isHour = i % 5 === 0;
    const outerR = 94, innerR = isHour ? 80 : 88;
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', 100 + outerR * Math.cos(angle));
    line.setAttribute('y1', 100 + outerR * Math.sin(angle));
    line.setAttribute('x2', 100 + innerR * Math.cos(angle));
    line.setAttribute('y2', 100 + innerR * Math.sin(angle));
    line.setAttribute('stroke', isHour ? '#63b3ed' : '#4a5568');
    line.setAttribute('stroke-width', isHour ? '2' : '1');
    ticksGroup.appendChild(line);
  }

  function tick() {
    const now = new Date();
    const s = now.getSeconds(), m = now.getMinutes(), h = now.getHours();
    const ms = now.getMilliseconds();

    const rotate = (el, deg) => el.setAttribute('transform', `rotate(${deg}, 100, 100)`);
    rotate(document.getElementById('secondHand'), (s + ms / 1000) * 6);
    rotate(document.getElementById('minuteHand'), (m + s / 60) * 6);
    rotate(document.getElementById('hourHand'),   ((h % 12) + m / 60) * 30);
  }

  tick();
  setInterval(tick, 50);
</script>
</body>
</html>
