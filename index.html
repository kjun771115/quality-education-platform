<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<meta name="description" content="품질기술사회 - 미래 품질 생태계를 선도하는 전문 교육 플랫폼">
<title>품질기술사회 · Quality Education Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f6f8fb;
  --surface: #ffffff;
  --surface-alt: #f1f4f8;
  --surface-hover: #eef2f7;
  --text: #1a1f2e;
  --text-muted: #6b7280;
  --text-soft: #9ca3af;
  --border: #e5e7eb;
  --border-strong: #d1d5db;
  --primary: #1e3a8a;
  --primary-2: #2563eb;
  --primary-light: #3b82f6;
  --hero-from: #1e3a8a;
  --hero-to: #2c52c9;
  --shadow-sm: 0 1px 2px rgba(15, 23, 42, .04);
  --shadow: 0 1px 3px rgba(15, 23, 42, .06), 0 1px 2px rgba(15, 23, 42, .04);
  --shadow-lg: 0 10px 25px -5px rgba(15, 23, 42, .08), 0 8px 10px -6px rgba(15, 23, 42, .04);
  --radius: 12px;
  --radius-lg: 16px;
  --c-blue: #2563eb;     --c-blue-bg: #dbeafe;
  --c-green: #059669;    --c-green-bg: #d1fae5;
  --c-purple: #7c3aed;   --c-purple-bg: #ede9fe;
  --c-violet: #8b5cf6;   --c-violet-bg: #f3e8ff;
  --c-orange: #ea580c;   --c-orange-bg: #ffedd5;
  --c-teal: #0d9488;     --c-teal-bg: #ccfbf1;
}
[data-theme="dark"] {
  --bg: #0b0f17;
  --surface: #161c28;
  --surface-alt: #1f2533;
  --surface-hover: #262d3d;
  --text: #f1f4f8;
  --text-muted: #9ca3af;
  --text-soft: #6b7280;
  --border: #2a3142;
  --border-strong: #374151;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, .3);
  --shadow: 0 1px 3px rgba(0, 0, 0, .35);
  --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, .4);
  --c-blue-bg: rgba(37, 99, 235, .15);
  --c-green-bg: rgba(5, 150, 105, .15);
  --c-purple-bg: rgba(124, 58, 237, .15);
  --c-violet-bg: rgba(139, 92, 246, .15);
  --c-orange-bg: rgba(234, 88, 12, .18);
  --c-teal-bg: rgba(13, 148, 136, .18);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Inter', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  line-height: 1.55;
  transition: background .25s ease, color .25s ease;
}
a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
img, svg { display: block; }
.container { max-width: 1240px; margin: 0 auto; padding: 0 24px; }

/* Header */
.site-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50;
  backdrop-filter: blur(8px);
}
.header-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 72px;
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-mark {
  width: 36px; height: 36px; border-radius: 8px;
  background: linear-gradient(135deg, #4f6df5, #2c52c9);
  display: grid; place-items: center; color: white;
}
.logo-text .name { font-weight: 700; font-size: 16px; letter-spacing: -.01em; }
.logo-text .sub { font-size: 10px; letter-spacing: .12em; color: var(--text-muted); font-weight: 500; }

.nav-pills { display: flex; align-items: center; gap: 4px; background: var(--surface-alt); padding: 5px; border-radius: 12px; }
.nav-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 500;
  color: var(--text-muted); transition: all .15s ease;
}
.nav-pill:hover { color: var(--text); }
.nav-pill.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm); }
[data-theme="dark"] .nav-pill.active { background: var(--primary-2); color: white; }

.header-right { display: flex; align-items: center; gap: 12px; }
.icon-btn {
  width: 38px; height: 38px; border-radius: 10px; display: grid; place-items: center;
  color: var(--text-muted); transition: all .15s ease;
}
.icon-btn:hover { background: var(--surface-alt); color: var(--text); }

/* Hero */
.hero {
  margin-top: 28px;
  background: linear-gradient(120deg, var(--hero-from) 0%, var(--hero-to) 100%);
  border-radius: 20px;
  padding: 56px 56px;
  color: white;
  position: relative;
  overflow: hidden;
}
.hero::before, .hero::after {
  content: ''; position: absolute; border-radius: 50%; background: rgba(255,255,255,.07);
}
.hero::before { width: 360px; height: 360px; right: -80px; top: -120px; }
.hero::after { width: 220px; height: 220px; right: 180px; bottom: -100px; background: rgba(255,255,255,.05); }
.hero-content { position: relative; z-index: 1; max-width: 760px; }
.hero-badge {
  display: inline-block; padding: 8px 16px; font-size: 13px; font-weight: 500;
  border: 1px solid rgba(255,255,255,.4); border-radius: 999px; margin-bottom: 24px;
}
.hero h1 {
  font-size: 44px; font-weight: 800; line-height: 1.2; letter-spacing: -.025em;
  margin-bottom: 18px;
}
.hero-desc { font-size: 16px; opacity: .92; max-width: 620px; line-height: 1.65; }
.hero-stats { display: flex; gap: 56px; margin-top: 36px; }
.stat .num { font-size: 38px; font-weight: 800; letter-spacing: -.02em; }
.stat .lbl { font-size: 13px; opacity: .82; margin-top: 2px; }

/* Sections */
.section { padding: 56px 0 32px; }
.section-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; }
.section-head h2 { font-size: 22px; font-weight: 700; letter-spacing: -.015em; }
.section-head p { color: var(--text-muted); font-size: 14px; margin-top: 4px; }
.section-head .right-icon { color: var(--c-blue); }

/* Category Grid */
.cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.cat-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 24px; cursor: pointer; transition: all .2s ease;
  text-align: left; width: 100%; display: flex; flex-direction: column;
}
.cat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); border-color: var(--border-strong); }
.cat-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.cat-icon {
  width: 44px; height: 44px; border-radius: 10px; display: grid; place-items: center;
}
.cat-count {
  background: var(--surface-alt); color: var(--text-muted); padding: 4px 12px;
  font-size: 12px; font-weight: 500; border-radius: 999px;
}
.cat-title { font-size: 18px; font-weight: 700; letter-spacing: -.01em; margin-bottom: 8px; }
.cat-desc { color: var(--text-muted); font-size: 13.5px; line-height: 1.6; flex: 1; }
.cat-link { color: var(--c-blue); font-size: 13px; font-weight: 500; margin-top: 16px; display: inline-flex; align-items: center; gap: 4px; }
[data-theme="dark"] .cat-link { color: var(--primary-light); }

.cat-blue .cat-icon { background: var(--c-blue-bg); color: var(--c-blue); }
.cat-green .cat-icon { background: var(--c-green-bg); color: var(--c-green); }
.cat-purple .cat-icon { background: var(--c-purple-bg); color: var(--c-purple); }
.cat-violet .cat-icon { background: var(--c-violet-bg); color: var(--c-violet); }
.cat-orange .cat-icon { background: var(--c-orange-bg); color: var(--c-orange); }
.cat-teal .cat-icon { background: var(--c-teal-bg); color: var(--c-teal); }

/* Breadcrumb / Back */
.back-link {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--text-muted); font-size: 14px; margin-bottom: 20px;
  padding: 8px 0; transition: color .15s ease;
}
.back-link:hover { color: var(--text); }

/* Course list (category page) */
.page-head { margin: 28px 0 32px; }
.page-head h1 { font-size: 28px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 8px; }
.page-head p { color: var(--text-muted); }
.course-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.course-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 22px; cursor: pointer; transition: all .15s ease;
  text-align: left; display: flex; flex-direction: column; gap: 8px;
}
.course-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow); transform: translateY(-1px); }
.course-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.tag { font-size: 11.5px; padding: 3px 10px; border-radius: 6px; font-weight: 500; }
.tag-code { background: var(--surface-alt); color: var(--text-muted); }
.tag-level-입문 { background: var(--c-green-bg); color: var(--c-green); }
.tag-level-중급 { background: var(--c-blue-bg); color: var(--c-blue); }
.tag-level-고급 { background: var(--c-orange-bg); color: var(--c-orange); }
.course-title { font-size: 17px; font-weight: 700; letter-spacing: -.01em; margin-top: 4px; }
.course-desc { color: var(--text-muted); font-size: 13.5px; line-height: 1.6; }
.course-foot { color: var(--text-soft); font-size: 12.5px; margin-top: 6px; display: inline-flex; align-items: center; gap: 5px; }

/* Course Detail */
.course-hero {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 28px 32px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: flex-start; gap: 24px;
}
.course-hero-left { flex: 1; }
.course-hero h1 { font-size: 26px; font-weight: 800; letter-spacing: -.02em; margin: 10px 0 10px; }
.course-hero .summary { color: var(--text-muted); margin-bottom: 14px; max-width: 720px; }
.course-hero-time { color: var(--text-soft); font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }
.btn-upload {
  background: var(--primary); color: white; padding: 10px 18px; border-radius: 10px;
  font-size: 13.5px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px;
  transition: all .15s ease;
}
.btn-upload:hover { background: var(--primary-2); }

/* Tabs */
.tabs {
  display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 6px; margin-bottom: 16px; overflow-x: auto;
}
.tab {
  padding: 10px 16px; border-radius: 8px; font-size: 13.5px; font-weight: 500;
  color: var(--text-muted); display: inline-flex; align-items: center; gap: 6px;
  white-space: nowrap; transition: all .15s ease;
}
.tab:hover { color: var(--text); }
.tab.active { background: var(--surface-alt); color: var(--text); box-shadow: var(--shadow-sm); }
.tab-count {
  background: var(--surface-alt); color: var(--text-muted); border-radius: 999px;
  padding: 1px 8px; font-size: 11px; font-weight: 600;
}
.tab.active .tab-count { background: var(--primary); color: white; }
[data-theme="dark"] .tab.active { background: var(--surface-hover); }

.tab-panel {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 22px 24px;
}
.tab-panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.tab-panel-head-left { display: flex; align-items: center; gap: 14px; }
.tab-icon {
  width: 36px; height: 36px; border-radius: 8px; display: grid; place-items: center;
  background: var(--c-blue-bg); color: var(--c-blue);
}
.tab-panel-head h3 { font-size: 15px; font-weight: 700; }
.tab-panel-head .sub { font-size: 12.5px; color: var(--text-muted); margin-top: 2px; }
.tab-panel-head-right { display: flex; align-items: center; gap: 8px; }
.count-badge {
  background: var(--surface-alt); padding: 4px 12px; border-radius: 999px;
  font-size: 12px; font-weight: 500; color: var(--text-muted);
}

/* File list */
.file-list { display: flex; flex-direction: column; gap: 8px; }
.file-item {
  display: flex; align-items: center; gap: 14px; padding: 12px 14px;
  border-radius: 10px; transition: background .15s ease;
  border: 1px solid var(--border);
}
.file-item:hover { background: var(--surface-alt); }
.file-icon {
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--c-blue-bg); color: var(--c-blue);
  display: grid; place-items: center; flex-shrink: 0;
}
.file-info { flex: 1; min-width: 0; }
.file-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.file-action {
  padding: 8px 14px; border-radius: 8px; font-size: 12.5px; font-weight: 500;
  background: var(--surface-alt); color: var(--text);
}
.file-action:hover { background: var(--surface-hover); }

/* Empty / Error states */
.state {
  text-align: center; padding: 32px 20px; border-radius: 10px;
  background: var(--surface-alt); color: var(--text-muted); font-size: 13.5px;
}
.state.empty { background: var(--surface-alt); }
.state-action {
  display: inline-flex; align-items: center; gap: 6px; margin-top: 14px;
  background: var(--primary); color: white; padding: 9px 16px; border-radius: 8px;
  font-size: 13px; font-weight: 500;
}

/* Modal */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(15, 23, 42, .5); z-index: 100;
  display: grid; place-items: center; padding: 24px;
  animation: fadeIn .15s ease;
}
.modal {
  background: var(--surface); border-radius: 16px; max-width: 540px; width: 100%;
  padding: 28px; box-shadow: var(--shadow-lg);
}
.modal h2 { font-size: 19px; font-weight: 700; margin-bottom: 8px; letter-spacing: -.01em; }
.modal p { color: var(--text-muted); font-size: 14px; line-height: 1.65; margin-bottom: 14px; }
.modal code {
  background: var(--surface-alt); padding: 2px 6px; border-radius: 4px;
  font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12.5px;
}
.modal-steps { padding-left: 20px; margin-bottom: 18px; }
.modal-steps li { color: var(--text); font-size: 13.5px; margin-bottom: 8px; line-height: 1.6; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }
.modal-btn { padding: 10px 18px; border-radius: 8px; font-weight: 500; font-size: 14px; }
.modal-btn.primary { background: var(--primary); color: white; }
.modal-btn.primary:hover { background: var(--primary-2); }
.modal-btn.ghost { background: var(--surface-alt); color: var(--text); }
.modal-btn.ghost:hover { background: var(--surface-hover); }

@keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
.spinner {
  width: 22px; height: 22px; border: 2.5px solid var(--border);
  border-top-color: var(--primary-2); border-radius: 50%;
  animation: spin .7s linear infinite; margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg) } }

/* Experts page */
.experts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 24px; }
.expert-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 24px; text-align: center;
}
.expert-avatar {
  width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, #4f6df5, #2c52c9);
  margin: 0 auto 14px; display: grid; place-items: center; color: white; font-weight: 700; font-size: 22px;
}
.expert-name { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
.expert-role { color: var(--text-muted); font-size: 13px; }
.expert-tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 12px; }

/* Footer */
.site-footer {
  margin-top: 64px; padding: 32px 0; border-top: 1px solid var(--border);
  color: var(--text-muted); font-size: 13px;
}
.footer-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }

/* Responsive */
@media (max-width: 900px) {
  .cat-grid { grid-template-columns: 1fr 1fr; }
  .course-grid, .experts-grid { grid-template-columns: 1fr; }
  .hero { padding: 40px 32px; }
  .hero h1 { font-size: 32px; }
  .hero-stats { gap: 28px; }
  .course-hero { flex-direction: column; }
}
@media (max-width: 600px) {
  .cat-grid { grid-template-columns: 1fr; }
  .header-inner { height: 60px; }
  .nav-pill span { display: none; }
  .logo-text .sub { display: none; }
  .hero { padding: 32px 24px; margin-top: 16px; border-radius: 14px; }
  .hero h1 { font-size: 26px; }
  .stat .num { font-size: 28px; }
  .container { padding: 0 16px; }
  .section { padding: 36px 0 16px; }
  .course-hero { padding: 22px 20px; }
  .tab-panel { padding: 18px 16px; }
}
</style>
</head>

<div id="app"></div>

<script>

/* ============================================================

      { id: 9, code: 'PQ-103', title: '예방품질 전략 수립', level: '고급', hours: 8, summary: '신제품 개발 단계의 예방품질 전략과 KPI 설계 방법을 학습합니다.' },

  {

const $ = (sel, ctx = document) => ctx.querySelector(sel);
const $$ = (sel, ctx = document) => Array.from(ctx.querySelectorAll(sel));
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const findCourse = (id) => {
  for (const cat of CATEGORIES) {
    const c = cat.courses.find(x => x.id === Number(id));
    if (c) return { course: c, category: cat };
  }
  return null;
};
const findCategory = (slug) => CATEGORIES.find(c => c.slug === slug);
const formatSize = (bytes) => {
  if (bytes == null) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(1) + ' MB';
};

/* ============================================================
   GitHub Materials API (with caching)
   ============================================================ */
async function listMaterials(courseId, tabKey) {
  const cacheKey = `gh_${courseId}_${tabKey}`;
  try {
    const cached = JSON.parse(localStorage.getItem(cacheKey) || 'null');
    if (cached && Date.now() - cached.t < CACHE_TTL_MS) return cached.d;
  } catch {}

  const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/materials/${courseId}/${tabKey}?ref=${REPO_BRANCH}`;
  let data = [];
  try {
    const res = await fetch(url);
    if (res.status === 404) {
      data = [];
    } else if (!res.ok) {
      throw new Error('GitHub API: ' + res.status);
    } else {
      const json = await res.json();
      if (Array.isArray(json)) {
        data = json
          .filter(f => f.type === 'file' && !f.name.startsWith('.'))
          .map(f => ({ name: f.name, url: f.download_url, size: f.size, htmlUrl: f.html_url }));
      }
    }
    try { localStorage.setItem(cacheKey, JSON.stringify({ t: Date.now(), d: data })); } catch {}
    return data;
  } catch (err) {
    console.warn('listMaterials error', err);
    return null; // null = network/error; [] = empty folder
  }
}

async function countAllMaterials(courseId) {
  const counts = {};
  let total = 0;
  await Promise.all(TABS.map(async t => {
    const files = await listMaterials(courseId, t.key);
    counts[t.key] = files ? files.length : 0;
    total += counts[t.key];
  }));
  return { counts, total };
}

   ============================================================ */
function parseRoute() {
  const hash = location.hash.replace(/^#\/?/, '');
  const parts = hash.split('/').filter(Boolean);
  if (parts.length === 0) return { name: 'home' };
  if (parts[0] === 'category' && parts[1]) return { name: 'category', slug: parts[1] };
  if (parts[0] === 'course' && parts[1]) return { name: 'course', id: parts[1], tab: parts[2] || 'overview' };
  if (parts[0] === 'experts') return { name: 'experts' };
  return { name: 'home' };
}

function navigate(path) {
  location.hash = path;
}

              <div class="cat-desc">${esc(c.description)}</div>
              <div class="cat-link">과정 보기 ${ICONS['arrow-right']}</div>
            </button>
          `).join('')}
        </div>
      </section>

      ${renderFooter()}
    </main>
  `;
}

function renderCategory(slug) {
  const cat = findCategory(slug);
  if (!cat) return renderNotFound();
  return `
    ${renderHeader('home')}
    <main class="container">
      <div style="margin-top: 24px;">
        <a href="#/" class="back-link">${ICONS['arrow-left']} 홈으로 돌아가기</a>
      </div>
      <div class="page-head">
        <h1>${esc(cat.name)}</h1>
        <p>${esc(cat.description)}</p>
      </div>
      <div class="course-grid">
        ${cat.courses.map(course => `
          <button class="course-card" onclick="navigate('/course/${course.id}')">
            <div class="course-meta">
              <span class="tag tag-code">${esc(course.code)}</span>
              <span class="tag tag-level-${course.level}">${esc(course.level)}</span>
            </div>
            <div class="course-title">${esc(course.title)}</div>
            <div class="course-desc">${esc(course.summary)}</div>
            <div class="course-foot">${ICONS.clock} 표준 ${course.hours}시간</div>
          </button>
        `).join('')}
      </div>
      ${renderFooter()}
    </main>
  `;
}

function renderCourse(courseId, activeTab) {
  const found = findCourse(courseId);
  if (!found) return renderNotFound();
  const { course, category } = found;
  return `
    ${renderHeader('home')}
    <main class="container">
      <div style="margin-top: 24px;">
        <a href="#/category/${category.slug}" class="back-link">${ICONS['arrow-left']} 카테고리로 돌아가기</a>
      </div>
      <div class="course-hero">
        <div class="course-hero-left">
          <div class="course-meta">
            <span class="tag tag-code">${esc(course.code)}</span>
            <span class="tag tag-level-${course.level}">${esc(course.level)}</span>
          </div>
          <h1>${esc(course.title)}</h1>
          <div class="summary">${esc(course.summary)}</div>
          <div class="course-hero-time">${ICONS.clock} 표준 ${course.hours}시간</div>
        </div>
        <button class="btn-upload" onclick="openUploadGuide(${course.id})">${ICONS.plus} 자료 업로드</button>
      </div>

      <div class="tabs" role="tablist" id="tabs-${course.id}">
        ${TABS.map(t => `
          <a href="#/course/${course.id}/${t.key}" class="tab ${t.key===activeTab?'active':''}" role="tab">
            ${ICONS[t.icon] || ''} ${esc(t.label)} <span class="tab-count" data-tab-count="${t.key}">0</span>
          </a>
        `).join('')}
      </div>

      <div class="tab-panel" id="tab-panel">
        ${renderTabPanelLoading(activeTab)}
      </div>

      ${renderFooter()}
    </main>
  `;
}

function renderTabPanelLoading(tabKey) {
  const t = TABS.find(x => x.key === tabKey) || TABS[0];
  return `
    <div class="tab-panel-head">
      <div class="tab-panel-head-left">
        <div class="tab-icon">${ICONS[t.icon] || ''}</div>
        <div>
          <h3>${esc(t.label)}</h3>
          <div class="sub">${esc(t.sub)}</div>
        </div>
      </div>
      <div class="tab-panel-head-right">
        <span class="count-badge" id="panel-count">0개 자료</span>
        <button class="icon-btn" id="panel-refresh" title="새로고침">${ICONS.refresh}</button>
      </div>
    </div>
    <div id="panel-body"><div class="spinner"></div></div>
  `;
}

function renderFileList(files, courseId, tabKey) {
  if (!files) {
    return `<div class="state">
      <div>자료 목록을 불러올 수 없습니다. 잠시 후 다시 시도해주세요.</div>
      <button class="state-action" onclick="reloadTab('${courseId}','${tabKey}')">${ICONS.refresh} 다시 시도</button>
    </div>`;
  }
  if (files.length === 0) {
    return `<div class="state empty">
      <div>아직 등록된 자료가 없습니다.</div>
      <button class="state-action" onclick="openUploadGuide(${courseId},'${tabKey}')">${ICONS.plus} 자료 추가하기</button>
    </div>`;
  }
  return `<div class="file-list">
    ${files.map(f => `
      <div class="file-item">
        <div class="file-icon">${ICONS.file}</div>
        <div class="file-info">
          <div class="file-name">${esc(f.name)}</div>
          <div class="file-meta">${formatSize(f.size)}</div>
        </div>
        <a class="file-action" href="${esc(f.url)}" download="${esc(f.name)}" target="_blank" rel="noopener">${ICONS.download} 다운로드</a>
      </div>
    `).join('')}
  </div>`;
}

function renderExperts() {
  const experts = [
    { name: '품질 전문가', role: '품질기술사', initials: '품', tags: ['IATF 16949', 'FMEA'] },
    { name: '통계 전문가', role: '통계 컨설턴트', initials: '통', tags: ['DOE', 'SPC'] },
    { name: 'AI 전문가', role: 'AI 품질 리서처', initials: 'AI', tags: ['ML', 'DL'] }
  ];
  return `
    ${renderHeader('experts')}
    <main class="container">
      <div class="page-head" style="margin-top: 32px;">
        <h1>전문가</h1>
        <p>품질기술사회와 함께하는 분야별 전문가를 만나보세요.</p>
      </div>
      <div class="experts-grid">
        ${experts.map(e => `
          <div class="expert-card">
            <div class="expert-avatar">${esc(e.initials)}</div>
            <div class="expert-name">${esc(e.name)}</div>
            <div class="expert-role">${esc(e.role)}</div>
            <div class="expert-tags">
              ${e.tags.map(t => `<span class="tag tag-code">${esc(t)}</span>`).join('')}
            </div>
          </div>
        `).join('')}
      </div>
      <div class="state" style="margin-top: 24px;">전문가 명단은 추후 업데이트됩니다.</div>
      ${renderFooter()}
    </main>
  `;
}

function renderNotFound() {
  return `
    ${renderHeader()}
    <main class="container">
      <div class="page-head" style="margin-top: 64px; text-align: center;">
        <h1>페이지를 찾을 수 없습니다</h1>
        <p>요청하신 페이지가 존재하지 않습니다.</p>
        <a href="#/" class="state-action" style="margin-top: 18px;">홈으로 돌아가기</a>
      </div>
      ${renderFooter()}
    </main>
  `;
}

function renderFooter() {
  return `
    <footer class="site-footer">
      <div class="footer-inner">
        <div>© ${new Date().getFullYear()} 품질기술사회 Quality Education Platform</div>
        <div>GitHub Pages 기반 정적 호스팅 · 안정적인 학습 환경</div>
      </div>
    </footer>
  `;
}

/* ============================================================
   Upload Guide Modal
   ============================================================ */
function openUploadGuide(courseId, tabKey) {
  const course = findCourse(courseId)?.course;
  const tab = tabKey ? TABS.find(t => t.key === tabKey) : null;
  const path = tabKey ? `materials/${courseId}/${tabKey}` : `materials/${courseId}`;
  const ghUrl = `https://github.com/${REPO_OWNER}/${REPO_NAME}/upload/${REPO_BRANCH}/${path}`;
  const tabLabel = tab ? `[${tab.label}]` : '';

  const html = `
    <div class="modal-backdrop" id="modal-backdrop">
      <div class="modal" role="dialog" aria-modal="true">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 12px;">
          <h2>자료 업로드 방법</h2>
          <button class="icon-btn" onclick="closeModal()" aria-label="닫기">${ICONS.close}</button>
        </div>
        <p>이 사이트는 <strong>GitHub Pages 기반 정적 호스팅</strong>이라 자료는 GitHub 저장소의 폴더로 직접 업로드합니다. (백엔드 서버가 없어 영구히 안정적입니다.)</p>
        <p><strong>${esc(course?.title || '')}</strong> 과정 ${esc(tabLabel)} 자료를 추가하려면:</p>
        <ol class="modal-steps">
          <li>아래 버튼을 누르면 GitHub의 <code>${esc(path)}</code> 폴더가 열립니다.</li>
          <li>파일을 화면 안으로 <strong>드래그</strong>하거나 <strong>"choose your files"</strong> 클릭해 선택하세요.</li>
          <li>아래쪽 <strong>"Commit changes"</strong> 버튼을 누르면 1~2분 뒤 이 페이지에서 자동으로 보입니다.</li>
        </ol>
        <p style="font-size:12.5px;">💡 PDF, PPTX, XLSX, ZIP 등 모든 파일 형식을 지원합니다. (개별 파일 최대 100MB)</p>
        <div class="modal-actions">
          <button class="modal-btn ghost" onclick="closeModal()">닫기</button>
          <a class="modal-btn primary" href="${esc(ghUrl)}" target="_blank" rel="noopener" onclick="closeModal()">
            GitHub에서 업로드 ${ICONS.external}
          </a>
        </div>
      </div>
    </div>
  `;
  const wrap = document.createElement('div');
  wrap.innerHTML = html;
  document.body.appendChild(wrap.firstElementChild);
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  const m = $('#modal-backdrop');
  if (m) m.remove();
  document.body.style.overflow = '';
}

/* ============================================================
   Tab data loading
   ============================================================ */
async function loadTabPanel(courseId, tabKey) {
  const body = $('#panel-body');
  const countEl = $('#panel-count');
  const refreshBtn = $('#panel-refresh');
  if (!body) return;

  body.innerHTML = '<div class="spinner"></div>';

  if (refreshBtn) {
    refreshBtn.onclick = () => {
      // bust cache
      try { localStorage.removeItem(`gh_${courseId}_${tabKey}`); } catch {}
      loadTabPanel(courseId, tabKey);
      refreshAllTabCounts(courseId);
    };
  }

  const files = await listMaterials(courseId, tabKey);
  body.innerHTML = renderFileList(files, courseId, tabKey);
  if (countEl) countEl.textContent = (files ? files.length : 0) + '개 자료';

  refreshAllTabCounts(courseId);
}

async function refreshAllTabCounts(courseId) {
  const { counts } = await countAllMaterials(courseId);
  TABS.forEach(t => {
    const el = document.querySelector(`[data-tab-count="${t.key}"]`);
    if (el) el.textContent = counts[t.key] || 0;
  });
}

function reloadTab(courseId, tabKey) {
  try { localStorage.removeItem(`gh_${courseId}_${tabKey}`); } catch {}
  loadTabPanel(courseId, tabKey);
}

/* ============================================================
   Main render
   ============================================================ */
function render() {
  const route = parseRoute();
  const app = $('#app');
  switch (route.name) {
    case 'home':
      app.innerHTML = renderHome();
      break;
    case 'category':
      app.innerHTML = renderCategory(route.slug);
      break;
    case 'course':
      app.innerHTML = renderCourse(route.id, route.tab);
      loadTabPanel(route.id, route.tab);
      break;
    case 'experts':
      app.innerHTML = renderExperts();
      break;
    default:
      app.innerHTML = renderNotFound();
  }
  bindGlobal();
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function bindGlobal() {
  const themeBtn = $('#themeToggleBtn');
  if (themeBtn) themeBtn.onclick = toggleTheme;
}

/* ============================================================
   Boot
   ============================================================ */
setTheme(getTheme());
window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', render);
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// Expose for inline handlers
window.navigate = navigate;
window.openUploadGuide = openUploadGuide;
window.closeModal = closeModal;
window.reloadTab = reloadTab;
</script>
</body>
</html>
