<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<meta name="description" content="품질기술사회 - 미래 품질 생태계를 선도하는 전문 교육 플랫폼">
<title>품질기술사회 · Quality Education Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f6f8fb;
  --surface: #ffffff;
  --surface-alt: #f1f4f8;
  --surface-hover: #eef2f7;
  --text: #1a1f2e;
  --text-muted: #6b7280;
  --text-soft: #9ca3af;
  --border: #e5e7eb;
  --border-strong: #d1d5db;
  --primary: #1e3a8a;
  --primary-2: #2563eb;
  --primary-light: #3b82f6;
  --hero-from: #1e3a8a;
  --hero-to: #2c52c9;
  --danger: #dc2626;
  --danger-bg: #fee2e2;
  --success: #059669;
  --success-bg: #d1fae5;
  --shadow-sm: 0 1px 2px rgba(15, 23, 42, .04);
  --shadow: 0 1px 3px rgba(15, 23, 42, .06), 0 1px 2px rgba(15, 23, 42, .04);
  --shadow-lg: 0 10px 25px -5px rgba(15, 23, 42, .08), 0 8px 10px -6px rgba(15, 23, 42, .04);
  --radius: 12px;
  --radius-lg: 16px;
  --c-blue: #2563eb;     --c-blue-bg: #dbeafe;
  --c-green: #059669;    --c-green-bg: #d1fae5;
  --c-purple: #7c3aed;   --c-purple-bg: #ede9fe;
  --c-violet: #8b5cf6;   --c-violet-bg: #f3e8ff;
  --c-orange: #ea580c;   --c-orange-bg: #ffedd5;
  --c-teal: #0d9488;     --c-teal-bg: #ccfbf1;
  --c-red: #dc2626;      --c-red-bg: #fee2e2;
}
[data-theme="dark"] {
  --bg: #0b0f17;
  --surface: #161c28;
  --surface-alt: #1f2533;
  --surface-hover: #262d3d;
  --text: #f1f4f8;
  --text-muted: #9ca3af;
  --text-soft: #6b7280;
  --border: #2a3142;
  --border-strong: #374151;
  --danger-bg: rgba(220, 38, 38, .18);
  --success-bg: rgba(5, 150, 105, .18);
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, .3);
  --shadow: 0 1px 3px rgba(0, 0, 0, .35);
  --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, .4);
  --c-blue-bg: rgba(37, 99, 235, .15);
  --c-green-bg: rgba(5, 150, 105, .15);
  --c-purple-bg: rgba(124, 58, 237, .15);
  --c-violet-bg: rgba(139, 92, 246, .15);
  --c-orange-bg: rgba(234, 88, 12, .18);
  --c-teal-bg: rgba(13, 148, 136, .18);
  --c-red-bg: rgba(220, 38, 38, .18);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Inter', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  line-height: 1.55;
  transition: background .25s ease, color .25s ease;
}
a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
img, svg { display: block; }
input { font: inherit; }
.container { max-width: 1240px; margin: 0 auto; padding: 0 24px; }

/* Header */
.site-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50;
  backdrop-filter: blur(8px);
}
.header-inner { display: flex; align-items: center; justify-content: space-between; height: 72px; }
.logo { display: flex; align-items: center; gap: 12px; }
.logo-mark {
  width: 36px; height: 36px; border-radius: 8px;
  background: linear-gradient(135deg, #4f6df5, #2c52c9);
  display: grid; place-items: center; color: white;
}
.logo-text .name { font-weight: 700; font-size: 16px; letter-spacing: -.01em; }
.logo-text .sub { font-size: 10px; letter-spacing: .12em; color: var(--text-muted); font-weight: 500; }

.nav-pills { display: flex; align-items: center; gap: 4px; background: var(--surface-alt); padding: 5px; border-radius: 12px; }
.nav-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 500;
  color: var(--text-muted); transition: all .15s ease;
}
.nav-pill:hover { color: var(--text); }
.nav-pill.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm); }
[data-theme="dark"] .nav-pill.active { background: var(--primary-2); color: white; }

.header-right { display: flex; align-items: center; gap: 10px; }
.icon-btn {
  width: 38px; height: 38px; border-radius: 10px; display: grid; place-items: center;
  color: var(--text-muted); transition: all .15s ease;
}
.icon-btn:hover { background: var(--surface-alt); color: var(--text); }
.admin-badge {
  background: var(--c-green-bg); color: var(--c-green);
  font-size: 11.5px; font-weight: 600; padding: 5px 10px; border-radius: 999px;
  display: inline-flex; align-items: center; gap: 5px;
}

/* Hero */
.hero {
  margin-top: 28px;
  background: linear-gradient(120deg, var(--hero-from) 0%, var(--hero-to) 100%);
  border-radius: 20px;
  padding: 56px 56px;
  color: white;
  position: relative;
  overflow: hidden;
}
.hero::before, .hero::after {
  content: ''; position: absolute; border-radius: 50%; background: rgba(255,255,255,.07);
}
.hero::before { width: 360px; height: 360px; right: -80px; top: -120px; }
.hero::after { width: 220px; height: 220px; right: 180px; bottom: -100px; background: rgba(255,255,255,.05); }
.hero-content { position: relative; z-index: 1; max-width: 760px; }
.hero-badge {
  display: inline-block; padding: 8px 16px; font-size: 13px; font-weight: 500;
  border: 1px solid rgba(255,255,255,.4); border-radius: 999px; margin-bottom: 24px;
}
.hero h1 { font-size: 44px; font-weight: 800; line-height: 1.2; letter-spacing: -.025em; margin-bottom: 18px; }
.hero-desc { font-size: 16px; opacity: .92; max-width: 620px; line-height: 1.65; }
.hero-stats { display: flex; gap: 56px; margin-top: 36px; }
.stat .num { font-size: 38px; font-weight: 800; letter-spacing: -.02em; }
.stat .lbl { font-size: 13px; opacity: .82; margin-top: 2px; }

/* Sections */
.section { padding: 56px 0 32px; }
.section-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; }
.section-head h2 { font-size: 22px; font-weight: 700; letter-spacing: -.015em; }
.section-head p { color: var(--text-muted); font-size: 14px; margin-top: 4px; }
.section-head .right-icon { color: var(--c-blue); }

/* Category Grid */
.cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.cat-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 24px; cursor: pointer; transition: all .2s ease;
  text-align: left; width: 100%; display: flex; flex-direction: column;
}
.cat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); border-color: var(--border-strong); }
.cat-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.cat-icon { width: 44px; height: 44px; border-radius: 10px; display: grid; place-items: center; }
.cat-count { background: var(--surface-alt); color: var(--text-muted); padding: 4px 12px; font-size: 12px; font-weight: 500; border-radius: 999px; }
.cat-title { font-size: 18px; font-weight: 700; letter-spacing: -.01em; margin-bottom: 8px; }
.cat-desc { color: var(--text-muted); font-size: 13.5px; line-height: 1.6; flex: 1; }
.cat-link { color: var(--c-blue); font-size: 13px; font-weight: 500; margin-top: 16px; display: inline-flex; align-items: center; gap: 4px; }
[data-theme="dark"] .cat-link { color: var(--primary-light); }

.cat-blue .cat-icon { background: var(--c-blue-bg); color: var(--c-blue); }
.cat-green .cat-icon { background: var(--c-green-bg); color: var(--c-green); }
.cat-purple .cat-icon { background: var(--c-purple-bg); color: var(--c-purple); }
.cat-violet .cat-icon { background: var(--c-violet-bg); color: var(--c-violet); }
.cat-orange .cat-icon { background: var(--c-orange-bg); color: var(--c-orange); }
.cat-teal .cat-icon { background: var(--c-teal-bg); color: var(--c-teal); }

/* Breadcrumb / Back */
.back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: 14px; margin-bottom: 20px; padding: 8px 0; transition: color .15s ease; }
.back-link:hover { color: var(--text); }

/* Page head + Course list */
.page-head { margin: 28px 0 32px; }
.page-head h1 { font-size: 28px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 8px; }
.page-head p { color: var(--text-muted); }
.course-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.course-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; cursor: pointer; transition: all .15s ease; text-align: left; display: flex; flex-direction: column; gap: 8px; }
.course-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow); transform: translateY(-1px); }
.course-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.tag { font-size: 11.5px; padding: 3px 10px; border-radius: 6px; font-weight: 500; }
.tag-code { background: var(--surface-alt); color: var(--text-muted); }
.tag-level-입문 { background: var(--c-green-bg); color: var(--c-green); }
.tag-level-중급 { background: var(--c-blue-bg); color: var(--c-blue); }
.tag-level-고급 { background: var(--c-orange-bg); color: var(--c-orange); }
.course-title { font-size: 17px; font-weight: 700; letter-spacing: -.01em; margin-top: 4px; }
.course-desc { color: var(--text-muted); font-size: 13.5px; line-height: 1.6; }
.course-foot { color: var(--text-soft); font-size: 12.5px; margin-top: 6px; display: inline-flex; align-items: center; gap: 5px; }

/* Course Detail */
.course-hero { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px 32px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: flex-start; gap: 24px; }
.course-hero-left { flex: 1; }
.course-hero h1 { font-size: 26px; font-weight: 800; letter-spacing: -.02em; margin: 10px 0 10px; }
.course-hero .summary { color: var(--text-muted); margin-bottom: 14px; max-width: 720px; }
.course-hero-time { color: var(--text-soft); font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; border-radius: 10px; font-size: 13.5px; font-weight: 500; transition: all .15s ease; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-2); }
.btn-ghost { background: var(--surface-alt); color: var(--text); }
.btn-ghost:hover { background: var(--surface-hover); }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: #b91c1c; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

/* Tabs */
.tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px; margin-bottom: 16px; overflow-x: auto; }
.tab { padding: 10px 16px; border-radius: 8px; font-size: 13.5px; font-weight: 500; color: var(--text-muted); display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; transition: all .15s ease; }
.tab:hover { color: var(--text); }
.tab.active { background: var(--surface-alt); color: var(--text); box-shadow: var(--shadow-sm); }
.tab-count { background: var(--surface-alt); color: var(--text-muted); border-radius: 999px; padding: 1px 8px; font-size: 11px; font-weight: 600; }
.tab.active .tab-count { background: var(--primary); color: white; }
[data-theme="dark"] .tab.active { background: var(--surface-hover); }

.tab-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px 24px; }
.tab-panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.tab-panel-head-left { display: flex; align-items: center; gap: 14px; }
.tab-icon { width: 36px; height: 36px; border-radius: 8px; display: grid; place-items: center; background: var(--c-blue-bg); color: var(--c-blue); }
.tab-panel-head h3 { font-size: 15px; font-weight: 700; }
.tab-panel-head .sub { font-size: 12.5px; color: var(--text-muted); margin-top: 2px; }
.tab-panel-head-right { display: flex; align-items: center; gap: 8px; }
.count-badge { background: var(--surface-alt); padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 500; color: var(--text-muted); }

/* Drop zone */
.drop-zone {
  border: 2px dashed var(--border-strong); border-radius: 12px; padding: 28px; text-align: center;
  margin-bottom: 18px; transition: all .15s ease; background: var(--surface-alt); cursor: pointer;
}
.drop-zone:hover, .drop-zone.dragover { border-color: var(--primary-2); background: var(--c-blue-bg); }
.drop-zone-text { color: var(--text-muted); font-size: 13.5px; margin-top: 8px; }
.drop-zone-text strong { color: var(--text); font-weight: 600; }
.drop-zone-icon { color: var(--primary-2); }
.drop-zone input[type=file] { display: none; }

/* File table (Drive style) */
.file-table { background: var(--surface); border-radius: 8px; overflow: hidden; }
.file-table-header {
  display: grid; grid-template-columns: 1fr 110px 110px 130px; gap: 12px;
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .05em;
}
.file-row {
  display: grid; grid-template-columns: 1fr 110px 110px 130px; gap: 12px; align-items: center;
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  transition: background .12s ease;
}
.file-row:last-child { border-bottom: none; }
.file-row:hover { background: var(--surface-alt); }
.file-row.uploading { opacity: .7; }
.file-name-cell { display: flex; align-items: center; gap: 12px; min-width: 0; }
.file-icon { width: 32px; height: 32px; border-radius: 7px; display: grid; place-items: center; flex-shrink: 0; }
.file-icon.fi-pdf { background: var(--c-red-bg); color: var(--c-red); }
.file-icon.fi-ppt { background: var(--c-orange-bg); color: var(--c-orange); }
.file-icon.fi-xls { background: var(--c-green-bg); color: var(--c-green); }
.file-icon.fi-doc { background: var(--c-blue-bg); color: var(--c-blue); }
.file-icon.fi-img { background: var(--c-purple-bg); color: var(--c-purple); }
.file-icon.fi-zip { background: var(--c-violet-bg); color: var(--c-violet); }
.file-icon.fi-default { background: var(--surface-alt); color: var(--text-muted); }
.file-name {
  font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1; min-width: 0;
}
.file-meta-cell { font-size: 13px; color: var(--text-muted); }
.file-actions { display: flex; gap: 4px; justify-content: flex-end; }
.file-action {
  width: 32px; height: 32px; border-radius: 8px; display: grid; place-items: center;
  color: var(--text-muted); transition: all .12s ease; background: transparent;
}
.file-action:hover { background: var(--surface-hover); color: var(--text); }
.file-action.fa-delete:hover { background: var(--danger-bg); color: var(--danger); }
.file-action.fa-rename:hover { background: var(--c-blue-bg); color: var(--c-blue); }

.upload-progress {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  background: var(--c-blue-bg); border-radius: 10px; margin-bottom: 12px;
  font-size: 13.5px; color: var(--c-blue);
}
.upload-progress .progress-bar {
  flex: 1; height: 6px; background: rgba(255,255,255,.5); border-radius: 999px; overflow: hidden;
}
.upload-progress .progress-fill {
  height: 100%; background: var(--primary-2); border-radius: 999px; transition: width .25s ease;
}

/* Empty / Error states */
.state { text-align: center; padding: 32px 20px; border-radius: 10px; background: var(--surface-alt); color: var(--text-muted); font-size: 13.5px; }
.state-action { display: inline-flex; align-items: center; gap: 6px; margin-top: 14px; background: var(--primary); color: white; padding: 9px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; }

/* Modal */
.modal-backdrop { position: fixed; inset: 0; background: rgba(15, 23, 42, .55); z-index: 100; display: grid; place-items: center; padding: 24px; animation: fadeIn .15s ease; }
.modal { background: var(--surface); border-radius: 16px; max-width: 560px; width: 100%; padding: 28px; box-shadow: var(--shadow-lg); max-height: calc(100vh - 48px); overflow-y: auto; }
.modal-title { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.modal h2 { font-size: 19px; font-weight: 700; letter-spacing: -.01em; }
.modal p { color: var(--text-muted); font-size: 14px; line-height: 1.65; margin-bottom: 12px; }
.modal code { background: var(--surface-alt); padding: 2px 6px; border-radius: 4px; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12.5px; }
.modal-steps { padding-left: 20px; margin: 8px 0 16px; }
.modal-steps li { color: var(--text); font-size: 13.5px; margin-bottom: 8px; line-height: 1.6; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
.modal-input {
  width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border-strong);
  background: var(--surface); color: var(--text); font-size: 14px; margin: 8px 0;
}
.modal-input:focus { outline: none; border-color: var(--primary-2); box-shadow: 0 0 0 3px rgba(37,99,235,.18); }
.modal-warning {
  background: var(--c-orange-bg); color: var(--c-orange); border-radius: 8px;
  padding: 10px 14px; font-size: 12.5px; margin: 10px 0; font-weight: 500;
}
.modal-success {
  background: var(--success-bg); color: var(--success); border-radius: 8px;
  padding: 10px 14px; font-size: 13px; margin: 10px 0;
}

/* Toast */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 10px; }
.toast {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 12px 18px; box-shadow: var(--shadow-lg); font-size: 13.5px;
  display: flex; align-items: center; gap: 10px; max-width: 380px;
  animation: slideIn .25s ease;
}
.toast.success { border-left: 3px solid var(--success); }
.toast.error { border-left: 3px solid var(--danger); }
.toast.info { border-left: 3px solid var(--primary-2); }
@keyframes slideIn { from { transform: translateX(20px); opacity: 0 } to { transform: translateX(0); opacity: 1 } }
@keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }

.spinner { width: 22px; height: 22px; border: 2.5px solid var(--border); border-top-color: var(--primary-2); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto; }
@keyframes spin { to { transform: rotate(360deg) } }

/* Experts page */
.experts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 24px; }
.expert-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; text-align: center; }
.expert-avatar { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, #4f6df5, #2c52c9); margin: 0 auto 14px; display: grid; place-items: center; color: white; font-weight: 700; font-size: 22px; }
.expert-name { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
.expert-role { color: var(--text-muted); font-size: 13px; }
.expert-tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 12px; }

/* Footer */
.site-footer { margin-top: 64px; padding: 32px 0; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 13px; }
.footer-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }

/* Responsive */
@media (max-width: 900px) {
  .cat-grid { grid-template-columns: 1fr 1fr; }
  .course-grid, .experts-grid { grid-template-columns: 1fr; }
  .hero { padding: 40px 32px; }
  .hero h1 { font-size: 32px; }
  .hero-stats { gap: 28px; }
  .course-hero { flex-direction: column; }
  .file-table-header { display: none; }
  .file-row { grid-template-columns: 1fr; gap: 6px; padding: 14px 16px; }
  .file-row .file-meta-cell { font-size: 12px; }
  .file-actions { justify-content: flex-start; margin-top: 6px; }
}
@media (max-width: 600px) {
  .cat-grid { grid-template-columns: 1fr; }
  .header-inner { height: 60px; }
  .nav-pill span { display: none; }
  .logo-text .sub { display: none; }
  .hero { padding: 32px 24px; margin-top: 16px; border-radius: 14px; }
  .hero h1 { font-size: 26px; }
  .stat .num { font-size: 28px; }
  .container { padding: 0 16px; }
  .section { padding: 36px 0 16px; }
  .course-hero { padding: 22px 20px; }
  .tab-panel { padding: 18px 16px; }
}
</style>
</head>
<body>
<div id="app"></div>

const formatSize = (bytes) => {
  if (bytes == null) return '-';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(1) + ' MB';
};
const fileExt = (name) => (name.match(/\.([^.]+)$/) || ['',''])[1].toLowerCase();
const fileIconClass = (name) => {
  const ext = fileExt(name);
  if (['pdf'].includes(ext)) return 'fi-pdf';
  if (['ppt','pptx','key'].includes(ext)) return 'fi-ppt';
  if (['xls','xlsx','csv','tsv'].includes(ext)) return 'fi-xls';
  if (['doc','docx','hwp','txt','md','rtf'].includes(ext)) return 'fi-doc';
  if (['png','jpg','jpeg','gif','webp','svg','bmp'].includes(ext)) return 'fi-img';
  if (['zip','rar','7z','tar','gz'].includes(ext)) return 'fi-zip';
  return 'fi-default';
};

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const r = reader.result;
      resolve(r.substring(r.indexOf(',') + 1));
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ============================================================
   Admin Token Management
   ============================================================ */
const TOKEN_KEY = 'qep_gh_token';
function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }
function setToken(t) { localStorage.setItem(TOKEN_KEY, t.trim()); }
function clearToken() { localStorage.removeItem(TOKEN_KEY); }
function isAdmin() { return !!getToken(); }

async function verifyToken(token) {
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`, {
      headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github+json' }
    });
    if (!res.ok) return { ok: false, error: 'Token이 유효하지 않거나 저장소 접근 권한이 없습니다 (HTTP ' + res.status + ')' };
    const data = await res.json();
    if (!data.permissions || !data.permissions.push) return { ok: false, error: '이 토큰은 쓰기 권한이 없습니다. Contents: Read and write 권한을 확인해 주세요.' };
    return { ok: true };
  } catch (e) {
    return { ok: false, error: '네트워크 오류: ' + e.message };
  }
}

/* ============================================================
   GitHub API
   ============================================================ */
function ghHeaders(includeAuth = true) {
  const h = { 'Accept': 'application/vnd.github+json' };
  if (includeAuth) {
    const t = getToken();
    if (t) h['Authorization'] = 'token ' + t;
  }
  return h;
}

async function ghListFiles(courseId, tabKey, { useCache = true } = {}) {
  const cacheKey = `qep_files_${courseId}_${tabKey}`;
  if (useCache) {
    try {
      const cached = JSON.parse(sessionStorage.getItem(cacheKey) || 'null');
      if (cached && Date.now() - cached.t < CACHE_TTL_MS) return cached.d;
    } catch {}
  }
  const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/materials/${courseId}/${tabKey}?ref=${REPO_BRANCH}`;
  try {
    const res = await fetch(url, { headers: ghHeaders() });
    if (res.status === 404) {
      const data = [];
      try { sessionStorage.setItem(cacheKey, JSON.stringify({ t: Date.now(), d: data })); } catch {}
      return data;
    }
    if (!res.ok) throw new Error('GitHub API: ' + res.status);
    const json = await res.json();
    const data = Array.isArray(json) ? json
      .filter(f => f.type === 'file' && !f.name.startsWith('.'))
      .map(f => ({ name: f.name, url: f.download_url, size: f.size, sha: f.sha, path: f.path, htmlUrl: f.html_url })) : [];
    try { sessionStorage.setItem(cacheKey, JSON.stringify({ t: Date.now(), d: data })); } catch {}
    return data;
  } catch (e) {
    console.warn('ghListFiles error', e);
    return null;
  }
}

async function ghPutFile(path, base64Content, message, sha) {
  const body = { message, content: base64Content, branch: REPO_BRANCH };
  if (sha) body.sha = sha;
  const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${encodeURI(path)}`, {
    method: 'PUT',
    headers: { ...ghHeaders(), 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const errText = await res.text();
    throw new Error('업로드 실패 (' + res.status + '): ' + errText.slice(0, 200));
  }
  return res.json();
}

async function ghDeleteFile(path, sha, message) {
  const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${encodeURI(path)}`, {
    method: 'DELETE',
    headers: { ...ghHeaders(), 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, sha, branch: REPO_BRANCH })
  });
  if (!res.ok) {
    const errText = await res.text();
    throw new Error('삭제 실패 (' + res.status + '): ' + errText.slice(0, 200));
  }
  return res.json();
}

// Get raw file content as base64 (for rename)
async function ghGetFileBase64(path) {
  const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${encodeURI(path)}?ref=${REPO_BRANCH}`, {
    headers: ghHeaders()
  });
  if (!res.ok) throw new Error('파일 조회 실패: ' + res.status);
  const data = await res.json();
  if (data.encoding === 'base64' && data.content) {
    return { content: data.content.replace(/\n/g, ''), sha: data.sha };
  }
  // Large files: fetch via download_url and re-encode
  const fileRes = await fetch(data.download_url);
  const blob = await fileRes.blob();
  const reader = new FileReader();
  return new Promise((resolve, reject) => {
    reader.onload = () => {
      const r = reader.result;
      resolve({ content: r.substring(r.indexOf(',') + 1), sha: data.sha });
    };
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

/* ============================================================
   Toast
   ============================================================ */
function toast(message, type = 'info', durationMs = 3500) {
  const container = $('#toast-container');
  if (!container) return;
  const icon = type === 'success' ? ICONS.check : type === 'error' ? ICONS.alert : ICONS.refresh;
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = `<span style="color: var(--${type === 'success' ? 'success' : type === 'error' ? 'danger' : 'primary-2'})">${icon}</span> <span>${esc(message)}</span>`;
  container.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, durationMs);
}

function parseRoute() {
  const hash = location.hash.replace(/^#\/?/, '');
  const parts = hash.split('/').filter(Boolean);
  if (parts.length === 0) return { name: 'home' };
  if (parts[0] === 'category' && parts[1]) return { name: 'category', slug: parts[1] };
  if (parts[0] === 'course' && parts[1]) return { name: 'course', id: parts[1], tab: parts[2] || 'overview' };
  if (parts[0] === 'experts') return { name: 'experts' };
  return { name: 'home' };
}

    <div class="modal-actions">
      <a href="${ghTokenUrl}" target="_blank" rel="noopener" class="btn btn-ghost">GitHub에서 토큰 발급 ${ICONS.external}</a>
      <button class="btn btn-primary" onclick="saveToken()">저장하고 검증</button>
    </div>
  `);
  setTimeout(() => $('#tokenInput')?.focus(), 50);
}

async function saveToken() {
  const input = $('#tokenInput');
  const status = $('#tokenStatus');
  if (!input || !status) return;
  const token = input.value.trim();
  if (!token) { status.innerHTML = '<div class="modal-warning">토큰을 입력해 주세요.</div>'; return; }
  status.innerHTML = '<div class="state" style="padding: 12px;"><div class="spinner" style="width: 18px; height: 18px;"></div> 토큰 검증 중...</div>';
  const result = await verifyToken(token);
  if (result.ok) {
    setToken(token);
    status.innerHTML = '<div class="modal-success">✓ 토큰이 등록되었습니다.</div>';
    toast('관리자 모드 활성화', 'success');
    setTimeout(() => { closeModal(); render(); }, 600);
  } else {
    status.innerHTML = '<div class="modal-warning">' + esc(result.error) + '</div>';
  }
}

function openTokenManage() {
  showModal(`
    <div class="modal-title">
      <h2>${ICONS.check} 관리자 모드</h2>
      <button class="icon-btn" onclick="closeModal()" aria-label="닫기">${ICONS.close}</button>
    </div>
    <p>관리자 모드가 활성화되어 있습니다. 모든 자료를 업로드·수정·삭제할 수 있습니다.</p>
    <div class="modal-success">✓ GitHub 토큰: 등록됨 (이 브라우저)</div>
    <p style="font-size: 12.5px;">다른 컴퓨터에서 관리하려면 그 컴퓨터에서도 토큰을 등록해야 합니다.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">닫기</button>
      <button class="btn btn-danger" onclick="logoutAdmin()">${ICONS.logout} 로그아웃</button>
    </div>
  `);
}

function logoutAdmin() {
  if (!confirm('관리자 모드를 종료하시겠습니까? 토큰은 이 브라우저에서 삭제됩니다.')) return;
  clearToken();
  toast('관리자 모드 종료', 'info');
  closeModal();
  render();
}

/* ============================================================
   Modals — Upload, Rename, Delete
   ============================================================ */
function triggerUpload(courseId, tabKey) {
  if (!isAdmin()) { openTokenSetup(); return; }
  const input = $(`#fileInput-${courseId}-${tabKey}`);
  if (input) input.click();
}

async function handleFilePicker(event, courseId, tabKey) {
  if (!isAdmin()) { openTokenSetup(); return; }
  const files = Array.from(event.target.files || []);
  event.target.value = '';
  if (files.length === 0) return;
  await uploadFiles(courseId, tabKey, files);
}

async function uploadFiles(courseId, tabKey, files) {
  if (!isAdmin()) { openTokenSetup(); return; }
  const statusEl = $(`#upload-status-${courseId}-${tabKey}`);
  const statuses = files.map(f => ({ name: f.name, state: '대기 중', percent: 0 }));
  const renderStatus = () => {
    if (!statusEl) return;
    statusEl.innerHTML = statuses.map(s => `
      <div class="upload-progress">
        <span style="flex-shrink: 0;">${ICONS.upload}</span>
        <div style="flex: 1; min-width: 0;">
          <div style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500;">${esc(s.name)}</div>
          <div style="font-size: 12px; opacity: .8; margin-top: 2px;">${esc(s.state)}</div>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width: ${s.percent}%"></div></div>
      </div>
    `).join('');
  };
  renderStatus();

  let okCount = 0, failCount = 0;
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    statuses[i].state = '인코딩 중...'; statuses[i].percent = 20; renderStatus();
    try {
      if (file.size > 100 * 1024 * 1024) throw new Error('100MB 초과 파일은 업로드할 수 없습니다.');
      const base64 = await fileToBase64(file);
      statuses[i].state = '업로드 중...'; statuses[i].percent = 60; renderStatus();
      const path = `materials/${courseId}/${tabKey}/${file.name}`;
      // Check for existing file (overwrite)
      let existingSha;
      try {
        const list = await ghListFiles(courseId, tabKey, { useCache: false });
        const exist = list?.find(f => f.name === file.name);
        if (exist) existingSha = exist.sha;
      } catch {}
      await ghPutFile(path, base64, `Upload ${file.name}`, existingSha);
      statuses[i].state = '✓ 완료'; statuses[i].percent = 100; renderStatus();
      okCount++;
    } catch (e) {
      console.error(e);
      statuses[i].state = '✗ 실패: ' + (e.message || '오류'); statuses[i].percent = 0; renderStatus();
      failCount++;
    }
  }
  if (okCount) toast(`${okCount}개 파일 업로드 완료`, 'success');
  if (failCount) toast(`${failCount}개 파일 실패`, 'error');

  invalidateCache(courseId, tabKey);
  setTimeout(() => { if (statusEl) statusEl.innerHTML = ''; }, 4000);
  // Refresh list
  loadTabPanel(courseId, tabKey);
}

function openRenameDialog(courseId, tabKey, oldName, sha) {
  if (!isAdmin()) { openTokenSetup(); return; }
  showModal(`
    <div class="modal-title">
      <h2>${ICONS.edit} 파일 이름 변경</h2>
      <button class="icon-btn" onclick="closeModal()" aria-label="닫기">${ICONS.close}</button>
    </div>
    <p>현재 이름: <code>${esc(oldName)}</code></p>
    <input type="text" class="modal-input" id="renameInput" value="${esc(oldName)}" placeholder="새 파일 이름">
    <div class="modal-warning">⚠️ 확장자(.pdf, .pptx 등)를 그대로 유지하세요.</div>
    <div id="renameStatus"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="doRename(${courseId}, '${tabKey}', '${esc(oldName).replace(/'/g, "\\'")}', '${esc(sha)}')">변경</button>
    </div>
  `);
  setTimeout(() => {
    const input = $('#renameInput');
    if (input) {
      input.focus();
      const dot = input.value.lastIndexOf('.');
      if (dot > 0) input.setSelectionRange(0, dot);
    }
  }, 50);
}

async function doRename(courseId, tabKey, oldName, oldSha) {
  const input = $('#renameInput');
  const status = $('#renameStatus');
  if (!input || !status) return;
  const newName = input.value.trim();
  if (!newName) { status.innerHTML = '<div class="modal-warning">이름을 입력해 주세요.</div>'; return; }
  if (newName === oldName) { closeModal(); return; }
  if (newName.includes('/') || newName.includes('\\')) { status.innerHTML = '<div class="modal-warning">파일명에 / 또는 \\\\ 를 사용할 수 없습니다.</div>'; return; }
  status.innerHTML = '<div class="state" style="padding: 12px;"><div class="spinner" style="width: 18px; height: 18px;"></div> 이름 변경 중...</div>';

  try {
    const oldPath = `materials/${courseId}/${tabKey}/${oldName}`;
    const newPath = `materials/${courseId}/${tabKey}/${newName}`;
    // 1) Get content
    const { content } = await ghGetFileBase64(oldPath);
    // 2) Create new file
    await ghPutFile(newPath, content, `Rename ${oldName} → ${newName}`);
    // 3) Delete old file
    await ghDeleteFile(oldPath, oldSha, `Rename: remove ${oldName}`);
    invalidateCache(courseId, tabKey);
    toast('이름 변경 완료', 'success');
    closeModal();
    loadTabPanel(courseId, tabKey);
  } catch (e) {
    console.error(e);
    status.innerHTML = '<div class="modal-warning">실패: ' + esc(e.message) + '</div>';
  }
}

function openDeleteConfirm(courseId, tabKey, name, sha) {
  if (!isAdmin()) { openTokenSetup(); return; }
  showModal(`
    <div class="modal-title">
      <h2 style="color: var(--danger);">${ICONS.trash} 파일 삭제</h2>
      <button class="icon-btn" onclick="closeModal()" aria-label="닫기">${ICONS.close}</button>
    </div>
    <p>정말 이 파일을 삭제하시겠습니까? <strong>복구할 수 없습니다.</strong></p>
    <div class="state" style="text-align: left; padding: 14px 18px;"><code>${esc(name)}</code></div>
    <div id="deleteStatus"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">취소</button>
      <button class="btn btn-danger" onclick="doDelete(${courseId}, '${tabKey}', '${esc(name).replace(/'/g, "\\'")}', '${esc(sha)}')">${ICONS.trash} 삭제</button>
    </div>
  `);
}

async function doDelete(courseId, tabKey, name, sha) {
  const status = $('#deleteStatus');
  if (status) status.innerHTML = '<div class="state" style="padding: 12px;"><div class="spinner" style="width: 18px; height: 18px;"></div> 삭제 중...</div>';
  try {
    const path = `materials/${courseId}/${tabKey}/${name}`;
    await ghDeleteFile(path, sha, `Delete ${name}`);
    invalidateCache(courseId, tabKey);
    toast('파일 삭제 완료', 'success');
    closeModal();
    loadTabPanel(courseId, tabKey);
  } catch (e) {
    console.error(e);
    if (status) status.innerHTML = '<div class="modal-warning">실패: ' + esc(e.message) + '</div>';
  }
}

/* ============================================================
   Modal helper
   ============================================================ */
function showModal(innerHtml) {
  closeModal();
  const wrap = document.createElement('div');
  wrap.className = 'modal-backdrop';
  wrap.id = 'modal-backdrop';
  wrap.innerHTML = `<div class="modal" role="dialog" aria-modal="true">${innerHtml}</div>`;
  wrap.addEventListener('click', (e) => { if (e.target === wrap) closeModal(); });
  document.body.appendChild(wrap);
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  const m = $('#modal-backdrop');
  if (m) m.remove();
  document.body.style.overflow = '';
}

/* ============================================================
   Drag & drop binding
   ============================================================ */
function bindDropZone(courseId, tabKey) {
  const zone = $(`#dropzone-${courseId}-${tabKey}`);
  if (!zone) return;
  ['dragenter', 'dragover'].forEach(ev => zone.addEventListener(ev, e => {
    e.preventDefault(); e.stopPropagation(); zone.classList.add('dragover');
  }));
  ['dragleave', 'drop'].forEach(ev => zone.addEventListener(ev, e => {
    e.preventDefault(); e.stopPropagation(); zone.classList.remove('dragover');
  }));
  zone.addEventListener('drop', async (e) => {
    if (!isAdmin()) { openTokenSetup(); return; }
    const files = Array.from(e.dataTransfer.files || []);
    if (files.length > 0) await uploadFiles(courseId, tabKey, files);
  });
}

/* ============================================================
   Tab data loading
   ============================================================ */
async function loadTabPanel(courseId, tabKey) {
  const body = $('#panel-body');
  const countEl = $('#panel-count');
  const refreshBtn = $('#panel-refresh');
  if (!body) return;
  body.innerHTML = '<div class="spinner"></div>';
  if (refreshBtn) {
    refreshBtn.onclick = () => {
      invalidateCache(courseId, tabKey);
      loadTabPanel(courseId, tabKey);
      refreshAllTabCounts(courseId);
    };
  }
  const files = await ghListFiles(courseId, tabKey);
  body.innerHTML = renderFilesTable(files, courseId, tabKey);
  if (countEl) countEl.textContent = (files ? files.length : 0) + '개 자료';
  bindDropZone(courseId, tabKey);
  refreshAllTabCounts(courseId);
}

async function refreshAllTabCounts(courseId) {
  await Promise.all(TABS.map(async t => {
    const files = await ghListFiles(courseId, t.key);
    const el = document.querySelector(`[data-tab-count="${t.key}"]`);
    if (el) el.textContent = files ? files.length : 0;
  }));
}

function reloadTab(courseId, tabKey) {
  invalidateCache(courseId, tabKey);
  loadTabPanel(courseId, tabKey);
}

/* ============================================================
   Main render
   ============================================================ */
function render() {
  const route = parseRoute();
  const app = $('#app');
  switch (route.name) {
    case 'home': app.innerHTML = renderHome(); break;
    case 'category': app.innerHTML = renderCategory(route.slug); break;
    case 'course':
      app.innerHTML = renderCourse(route.id, route.tab);
      loadTabPanel(route.id, route.tab);
      break;
    case 'experts': app.innerHTML = renderExperts(); break;
    default: app.innerHTML = renderNotFound();
  }
  bindGlobal();
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function bindGlobal() {
  const themeBtn = $('#themeToggleBtn');
  if (themeBtn) themeBtn.onclick = toggleTheme;
}

/* ============================================================
   Boot
   ============================================================ */
setTheme(getTheme());
window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', render);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

// Expose for inline handlers
window.navigate = navigate;
window.openTokenSetup = openTokenSetup;
window.openTokenManage = openTokenManage;
window.saveToken = saveToken;
window.logoutAdmin = logoutAdmin;
window.triggerUpload = triggerUpload;
window.handleFilePicker = handleFilePicker;
window.uploadFiles = uploadFiles;
window.openRenameDialog = openRenameDialog;
window.doRename = doRename;
window.openDeleteConfirm = openDeleteConfirm;
window.doDelete = doDelete;
window.closeModal = closeModal;
window.reloadTab = reloadTab;
</script>
</body>
</html>
